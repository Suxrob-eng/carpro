services:
  # ===== BACKEND: FastAPI (Web Service) =====
  - type: web
    name: carpro-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ===== FRONTEND: React Static Site =====
  - type: web
    name: carpro-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://carpro-backend.onrender.com/api
      - key: VITE_API_BASE
        value: https://carpro-backend.onrender.com/api
    routes:
      # React SPA - barcha yo'llarni index.html ga yo'naltirish
      - type: rewrite
        source: /*
        destination: /index.html
